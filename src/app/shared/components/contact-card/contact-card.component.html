<button type="button" class="contact-card card w-100 text-bg-dark rounded-4 pressButton" (click)="selected.emit()">
    <div class="d-flex align-items-center p-3 gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="contact-icon flex-shrink-0" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6" />
        </svg>
        <span class="contact-name">
            {{ fullName() }}
            @if (phone()) {
            <span class="contact-phone">{{ phone() }}</span>
            }
        </span>
        <ej-whatsapp-icon [size]="20" class="ms-auto flex-shrink-0 wsp-icon" />
    </div>
</button>
