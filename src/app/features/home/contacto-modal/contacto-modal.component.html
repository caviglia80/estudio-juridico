<div class="modal-content">
    <ej-modal-header title="Contacto" />

    <div class="modal-body">
        @if (!iframeCargado()) {
        <div class="d-block text-center">
            <div class="spinner-border text-light" aria-label="Cargando mapa…">
                <span class="visually-hidden">Cargando mapa…</span>
            </div>
        </div>
        }

        <iframe title="Mapa de ubicación del estudio" [hidden]="!iframeCargado()"
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d580.5886145253813!2d-60.94624609325518!3d-34.596443931427444!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95b8eb77ddd35dad%3A0xf9a7b53ea2c9c878!2sEstudio%20Juridico%20Caviglia%20y%20Asociados!5e0!3m2!1ses-419!2sar!4v1690067245902!5m2!1ses-419!2sar"
            class="mapa" width="100%" height="400" allowfullscreen sandbox="allow-scripts allow-same-origin allow-popups" referrerpolicy="no-referrer" (load)="onIframeLoad()"></iframe>
    </div>

    <div class="modal-footer">
        <address class="w-100 text-center mb-2 address">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="bi bi-geo-alt-fill" viewBox="0 0 16 16" aria-hidden="true">
                <path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10m0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6" />
            </svg>
            {{ contact.address }}
        </address>

        <div class="row w-100">
            <div class="col">
                <ul class="list-unstyled mb-2">
                    @for (abogado of abogados; track abogado.tel) {
                    <li class="item">{{ abogado.fullName }}: {{ abogado.displayPhone }}</li>
                    }
                </ul>
                <span class="item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="bi bi-envelope-fill" viewBox="0 0 16 16" aria-hidden="true">
                        <path d="M.05 3.555A2 2 0 0 1 2 2h12a2 2 0 0 1 1.95 1.555L8 8.414zM0 4.697v7.104l5.803-3.558zM6.761 8.83l-6.57 4.027A2 2 0 0 0 2 14h12a2 2 0 0 0 1.808-1.144l-6.57-4.027L8 9.586zm3.436-.586L16 4.697v7.104z" />
                    </svg>
                    {{ contact.email }}
                </span>
            </div>
        </div>
    </div>
</div>
