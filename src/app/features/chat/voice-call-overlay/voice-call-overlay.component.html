<div class="voice-overlay" role="dialog" aria-modal="true" aria-label="Llamada de voz con Gideon">
    <div class="voice-stage">
        <div class="voice-ring"
            [class.voice-ring-listening]="voice.state() === 'listening'"
            [class.voice-ring-thinking]="voice.state() === 'thinking' || voice.state() === 'connecting'"
            [class.voice-ring-speaking]="voice.state() === 'speaking'"
            [style.--mic-level]="voice.micLevel()">
            <img class="voice-logo" ngSrc="assets/img/logo.png" width="1280" height="960" alt="" />
        </div>
        <p class="voice-status">{{ stateLabel() }}</p>
        @if (voice.modelLabel()) {
        <p class="voice-meta">{{ voice.modelLabel() }} · {{ elapsed() }}</p>
        }
        <p class="voice-transcript" [class.voice-transcript-user]="voice.partialTranscript().length > 0">
            {{ voice.partialTranscript() || voice.speakingText() }}
        </p>
        @if (voice.errorMessage(); as voiceError) {
        <p class="voice-error" role="alert">{{ voiceError }}</p>
        }
        <div class="voice-actions">
            @if (voice.state() === 'speaking' || voice.state() === 'thinking') {
            <button type="button" class="voice-btn voice-btn-interrupt" (click)="voice.interrupt()" aria-label="Interrumpir a Gideon">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M5.5 3.5A1.5 1.5 0 0 1 7 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5m5 0A1.5 1.5 0 0 1 12 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5" />
                </svg>
                <span>Interrumpir</span>
            </button>
            }
            <button type="button" class="voice-btn voice-btn-hangup" (click)="voice.hangUp()" aria-label="Finalizar llamada">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M1.885.511a1.745 1.745 0 0 1 2.61.163L6.29 2.98c.329.423.445.974.315 1.494l-.547 2.19a.68.68 0 0 0 .178.643l2.457 2.457a.68.68 0 0 0 .644.178l2.189-.547a1.75 1.75 0 0 1 1.494.315l2.306 1.794c.829.645.905 1.87.163 2.611l-1.034 1.034c-.74.74-1.846 1.065-2.877.702a18.6 18.6 0 0 1-7.01-4.42 18.6 18.6 0 0 1-4.42-7.009c-.362-1.03-.037-2.137.703-2.877z" />
                </svg>
            </button>
        </div>
    </div>
</div>
